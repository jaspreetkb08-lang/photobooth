<!DOCTYPE html>
<html lang="en" translate="no">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jass is bored | Vintage Photo Booth</title>
  <meta name="description" content="A mechanical, analog photo booth experience in your browser.">

  <!-- Custom Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">

  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="styles.css">

  <!-- HTML to Image CDN for Strip Print Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.js"></script>
</head>

<body>

  <div class="app-container">
    <!-- Retro Film Grain Overlay -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <main class="main-content">

      <!-- 1. HOME VIEW (LANDING PAGE) -->
      <div id="home-view" class="home-layout">
        <header class="home-header">
          <div class="brand-mark">
            <span class="pulse-indicator"></span>jass is bored
          </div>
        </header>

        <main class="hero-section">
          <div class="hero-content">
            <h1 class="hero-headline">
              Step Into <br><span class="accent-text">The Booth.</span>
            </h1>
            <p class="hero-description">Four photos, say cheese!!!</p>
            <div class="cta-wrapper">
              <button id="begin-session-btn" class="primary-cta" type="button">
                <!-- Inline Camera Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cta-icon">
                  <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z">
                  </path>
                  <circle cx="12" cy="13" r="3"></circle>
                </svg>
                BEGIN SESSION
              </button>
            </div>
          </div>

          <div class="visual-container">
            <div class="faux-strip">
              <div class="faux-photo faux-photo-1"></div>
              <div class="faux-photo faux-photo-2"></div>
              <div class="faux-photo faux-photo-3"></div>
              <div class="faux-photo faux-photo-4"></div>
            </div>
          </div>
        </main>
      </div>

      <!-- 2. BOOTH SESSION VIEW -->
      <div id="booth-view" class="booth-container" style="display: none;">
        <header class="booth-header">
          <div class="header-side">
            <a href="#" id="abort-session-link" class="back-link">
              <!-- Left Arrow Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              ABORT SESSION
            </a>
          </div>

          <div class="attribution">
            <div>by Jass</div>
            <a href="https://www.instagram.com/jaspreet._.bassi/" target="_blank" rel="noopener noreferrer"
              class="social-link">
              <!-- Instagram Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
              @Jass
            </a>
          </div>

          <div class="header-side"></div>
        </header>

        <main class="booth-main">

          <!-- Idle Panel (Webcam, filters, shutter) -->
          <div id="booth-idle-panel" class="capture-layout">
            <div class="viewfinder-column">
              <div class="viewfinder-frame">
                <!-- Viewfinder Corners -->
                <div class="corner-tl"></div>
                <div class="corner-tr"></div>
                <div class="corner-bl"></div>
                <div class="corner-br"></div>

                <!-- Video Stream -->
                <video id="webcam-video" autoplay playsinline muted></video>

                <!-- Loading State -->
                <div id="webcam-loading" class="loading-state">
                  <p>WARMING UP OPTICS...</p>
                </div>

                <!-- Countdown Overlay -->
                <div id="countdown-overlay" class="countdown-overlay" style="display: none;">
                  <span id="countdown-number" class="countdown-number">3</span>
                </div>

                <!-- Filter Graphic Overlays -->
                <!-- Star B&W Starry Night Overlay -->
                <div id="filter-overlay-vintage-bw" class="dust-layer-wrapper" style="display: none;">
                  <div class="dust-layer"></div>
                  <div id="stars-container" class="stars-container"></div>
                  <div class="vignette"></div>
                </div>

                <!-- Mother's Day Flowers/Hearts Overlay -->
                <div id="filter-overlay-mothersday" class="mothersday-overlay" style="display: none;">
                  <div id="hearts-container" class="hearts-container"></div>
                  <div id="daisies-container" class="daisies-container"></div>
                  <div id="sparkles-container" class="sparkles-container"></div>
                </div>

                <!-- Jellyfish Underwater Overlay -->
                <div id="filter-overlay-jellyfish" class="jellyfish-overlay" style="display: none;">
                  <div id="lens-flares-container"></div>
                  <div id="bubbles-container"></div>
                  <div id="jellyfish-graphics-container"></div>
                  <!-- Grass border at the bottom -->
                  <svg id="grass-svg" class="grass-border" viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg"
                    preserveAspectRatio="none"></svg>
                </div>

                <!-- Shutter Flash Overlay -->
                <div id="flash-overlay" class="flash-overlay" style="display: none;"></div>

                <!-- Hidden Processing Canvas -->
                <canvas id="photo-canvas" class="hidden-canvas"></canvas>
              </div>

              <!-- Bottom Controls -->
              <div class="controls-panel">
                <!-- Film exposed status panel -->
                <div class="status-panel">
                  <span class="status-label">FILM STATUS</span>
                  <div id="film-slots" class="film-indicator">
                    <div class="film-slot" data-slot="0"></div>
                    <div class="film-slot" data-slot="1"></div>
                    <div class="film-slot" data-slot="2"></div>
                    <div class="film-slot" data-slot="3"></div>
                  </div>
                  <span id="status-text-count" class="status-text">0 / 4 EXPOSED</span>
                </div>

                <!-- Inline filter list (visible on mobile) -->
                <div class="filter-panel-inline">
                  <div class="filter-panel">
                    <div class="filter-list" id="filter-list-inline">
                      <!-- Rendered dynamically -->
                    </div>
                  </div>
                </div>

                <!-- Shutter Trigger -->
                <button id="shutter-trigger-btn" class="shutter-button" type="button">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shutter-icon">
                    <path
                      d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z">
                    </path>
                    <circle cx="12" cy="13" r="3"></circle>
                  </svg>
                  INITIATE SEQUENCE
                </button>

                <!-- Capturing Indicator -->
                <div id="capturing-indicator" class="capturing-indicator" style="display: none;">
                  <span class="pulsing-dot"></span> SEQUENCE IN PROGRESS
                </div>
              </div>
            </div>

            <!-- Desktop Filters Panel (visible on desktop) -->
            <aside class="filter-panel-desktop">
              <div class="filter-panel">
                <div class="filter-panel-header">FILTER</div>
                <div class="filter-list" id="filter-list-desktop">
                  <!-- Rendered dynamically -->
                </div>
              </div>
            </aside>
          </div>

          <!-- Developing Darkroom Transition Panel -->
          <div id="booth-developing-panel" class="developing-overlay" style="display: none;">
            <div class="developing-text">DEVELOPING...</div>
            <div class="loading-bar-track">
              <div id="loading-bar-fill" class="loading-bar-fill"></div>
            </div>
          </div>

          <!-- Results Print Strip Panel -->
          <div id="booth-result-panel" class="result-container" style="display: none;">
            <div class="strip-wrapper">
              <!-- This element will be saved by html-to-image -->
              <div id="photo-strip" class="strip-physical">
                <div class="strip-texture"></div>
                <div class="strip-inner" id="strip-inner-photos">
                  <!-- Photos, text gaps and stamp footer will render here -->
                </div>
              </div>
            </div>

            <div class="actions-container">
              <button id="download-print-btn" class="download-btn" type="button">
                <!-- Download icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                EXTRACT PRINT
              </button>

              <button id="new-session-btn" class="retake-btn" type="button">
                <!-- Rotate icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                </svg>
                NEW SESSION
              </button>
            </div>
          </div>

          <!-- System Error Box -->
          <div id="booth-error-panel" class="error-container" style="display: none;">
            <div class="error-box">
              <h3>SYSTEM ERROR</h3>
              <p id="booth-error-message">Failed to access camera. Please check permissions.</p>
              <button id="retry-camera-btn" class="retry-btn" type="button">RETRY INITIALIZATION</button>
            </div>
          </div>

        </main>
      </div>

    </main>
  </div>

  <!-- Custom Javascript Logic -->
  <script src="app.js"></script>
</body>

</html>
